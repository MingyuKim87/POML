name: Deploy to gh-pages branch

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy repository contents to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./
          enable_jekyll: true
          force_orphan: true
          # NOTE:
          # Do not exclude .git here. peaceiris/actions-gh-pages manages git metadata
          # internally while creating the publish commit. Excluding .git can cause
          # "fatal: not a git repository" errors during remote setup.
          exclude_assets: |
            .github
