<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}" />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-inner">
        <a class="brand" href="{{ '/' | relative_url }}">
          <img src="{{ '/assets/images/logo.png' | relative_url }}" alt="POML logo" onerror="this.style.display='none';document.getElementById('brand-fallback').style.display='inline-block';" />
          <span id="brand-fallback" class="brand-fallback" style="display:none;">POML</span>
          <span class="brand-text">
            <span class="brand-title">POML</span>
            <span class="brand-subtitle">Precision Objects & Machine Learning Lab</span>
          </span>
        </a>
        <nav>
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/people/' | relative_url }}">People</a>
          <a href="{{ '/publications/' | relative_url }}">Publications</a>
          <a href="{{ '/news/' | relative_url }}">News</a>
          <a href="{{ '/gallery/' | relative_url }}">Gallery</a>
          <a href="{{ '/join/' | relative_url }}">Join</a>
          <a href="{{ '/admin/' | relative_url }}">Admin</a>
        </nav>
      </div>
    </header>

    <main class="container">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="site-footer-inner">
        <p>© {{ "now" | date: "%Y" }} {{ site.title }}. Built with GitHub Pages.</p>
      </div>
    </footer>
  </body>
</html>
