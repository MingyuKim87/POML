<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=PT+Serif:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-inner">
        <a class="brand" href="{{ '/' | relative_url }}">
          <img src="{{ '/assets/images/logo.png' | relative_url }}" alt="PML logo" onerror="this.style.display='none';document.getElementById('brand-fallback').style.display='inline-block';" />
          <span id="brand-fallback" class="brand-fallback" style="display:none;">PML</span>
          <span class="brand-text">
            <span class="brand-title">PML</span>
            <span class="brand-subtitle">Probabilistic Machine Learning Lab</span>
          </span>
        </a>
        <nav>
          <a href="{{ '/people/' | relative_url }}">people</a>
          <a href="{{ '/publications/' | relative_url }}">publications</a>
          <a href="{{ '/news/' | relative_url }}">news</a>
          <a href="{{ '/gallery/' | relative_url }}">gallery</a>
          <a href="{{ '/join/' | relative_url }}">join</a>
        </nav>
      </div>
    </header>

    <main class="container">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="site-footer-inner">
        <p>© 2026</p>
      </div>
    </footer>
  </body>
</html>
